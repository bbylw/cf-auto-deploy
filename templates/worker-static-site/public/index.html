<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Site on Cloudflare Workers</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
    h1 { color: #f6821f; }
    a { color: #f6821f; }
  </style>
</head>
<body>
  <h1>Hello from Cloudflare Workers!</h1>
  <p>This static site is served from the <code>./public</code> directory via the <code>[assets]</code> binding.</p>
  <p>Try the <a href="/api/time">/api/time</a> endpoint for a dynamic response.</p>
</body>
</html>
